// ── Signature Pad ─────────────────────────────────────────────────────────────
function SignatureInput({ onSave, onClear }) {
  const canvasRef = useRef(null);
  const drawing   = useRef(false);
  const lastPos   = useRef({ x:0, y:0 });

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return { x:(src.clientX - rect.left)*(canvas.width/rect.width), y:(src.clientY - rect.top)*(canvas.height/rect.height) };
  };

  const startDraw = (e) => {
    e.preventDefault();
    drawing.current = true;
    lastPos.current = getPos(e, canvasRef.current);
  };
  const draw = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx    = canvas.getContext('2d');
    const pos    = getPos(e, canvas);
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();
    lastPos.current = pos;
  };
  const endDraw = () => {
    if (!drawing.current) return;
    drawing.current = false;
    onSave(canvasRef.current.toDataURL());
  };
  const clear = () => {
    const canvas = canvasRef.current;
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    onClear();
  };

  return (
    <div className="space-y-2">
      <canvas ref={canvasRef} width={600} height={160}
        className="sig-canvas"
        onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
      />
      <button onClick={clear} className="text-xs text-slate-400 hover:text-rose-500 transition-colors font-medium">
        ล้างลายเซ็น
      </button>
    </div>
  );
}

// ── QR Code component ─────────────────────────────────────────────────────────
function QRCode({ value, size = 120 }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (canvasRef.current && window.QRCode) {
      window.QRCode.toCanvas(canvasRef.current, value, { width: size, margin: 1 }, () => {});
    }
  }, [value, size]);
  return <canvas ref={canvasRef} className="rounded-lg" />;
}

    reader.readAsDataURL(file);
  };

  const submitAudit = () => {
    if (!currentAudit.auditorName || !currentAudit.department || !currentAudit.signature) {
      alert('กรุณากรอกข้อมูลให้ครบถ้วน รวมถึงลายเซ็น');
      return;
    }
    if (currentAudit.items.some(i => i.isCustom && !i.question)) {
      alert('กรุณาระบุหัวข้อสำหรับรายการที่เพิ่มมาใหม่');
      return;
    }
    if (currentAudit.items.some(i => !i.score)) {
      alert('กรุณาประเมินหัวข้อการตรวจให้ครบทุกข้อ');
      return;
    }

    const scoreMap = { C:1, NC:0, OBS:1 };
    const totalScore = currentAudit.items.reduce((s, i) => s + (scoreMap[i.score] || 0), 0);
    const maxScore   = currentAudit.items.length;
    const passPct    = maxScore > 0 ? (totalScore / maxScore) * 100 : 0;
    const isPass     = passPct >= 70;

    const generatedCars = [];
    const updatedItems  = currentAudit.items.map(item => {
      if (item.score === 'NC' || item.score === 'OBS') {
        const carId = uuid();
        generatedCars.push({
          id: carId, auditId: currentAudit.id, itemId: item.id,
          question: item.question,
          finding: item.comment || (item.score === 'NC' ? 'พบข้อบกพร่อง (Non-Compliant)' : 'ข้อสังเกตจากการตรวจ (Observation)'),
          severity: item.score === 'NC' ? CARSeverity.MAJOR : CARSeverity.MINOR,
          issuedDate: new Date().toISOString(),
          dueDate: new Date(Date.now() + 7*86400000).toISOString(),
          status: CARStatus.OPEN,
          issuedBy: currentAudit.auditorName,
          assignedTo: 'หัวหน้าแผนก ' + currentAudit.department,
          carNumber: item.carNumber,
        });
        return { ...item, carId };
      }
      return item;
    });

    const finalAudit = { ...currentAudit, items:updatedItems, totalScore, maxScore, passPercentage:passPct, isPass, cars:generatedCars, round:currentAudit.round||1 };
    const newAudits  = isEditing ? audits.map(a => a.id === finalAudit.id ? finalAudit : a) : [finalAudit, ...audits];
    setAudits(newAudits);
    confetti({ particleCount:100, spread:70, origin:{ y:0.6 } });
    setView('dashboard');
    setIsEditing(false);
  };

  const deleteAudit = (id) => {
    setAudits(audits.filter(a => a.id !== id));
    setDeleteConfirmId(null);
    if (view === 'report') setView('dashboard');
  };

  const updateCARStatus = (auditId, carId, newStatus) => {
    setAudits(audits.map(audit => audit.id !== auditId ? audit : {
      ...audit,
      cars: audit.cars.map(car => car.id !== carId ? car : {
        ...car, status: newStatus, closedDate: newStatus === CARStatus.CLOSED ? new Date().toISOString() : car.closedDate
      })
    }));
  };

  const submitCARResponse = () => {
    if (!respondingCar) return;
    if (!carResponseData.rootCause || !carResponseData.correction || !carResponseData.signature) {
      alert('กรุณากรอกข้อมูลให้ครบถ้วน รวมถึงลายเซ็น');
      return;
    }
    setAudits(audits.map(audit => audit.id !== respondingCar.auditId ? audit : {
      ...audit,
      cars: audit.cars.map(car => car.id !== respondingCar.id ? car : {
        ...car, ...carResponseData, status: CARStatus.PENDING
      })
    }));
    alert('ส่งข้อมูลการแก้ไขเรียบร้อยแล้ว');
    setRespondingCar(null);
    setCarResponseData({ rootCause:'', correction:'', correctiveAction:'', preventiveAction:'', photo:'', signature:'' });
  };

  const getDeptStats = () => {
    const stats = {};
    filteredAudits.forEach(a => {
      if (!stats[a.department]) stats[a.department] = { total:0, passed:0, avgScore:0 };
      stats[a.department].total++;
      if (a.isPass) stats[a.department].passed++;
      stats[a.department].avgScore += a.passPercentage;
    });
    return Object.entries(stats).map(([name,s]) => ({ name, ...s, avgScore: s.avgScore/s.total })).sort((a,b) => b.avgScore - a.avgScore);
  };

  const generateExcel = () => {
    const data = filteredAudits.map(a => ({
      'Audit ID': a.id.slice(0,8), 'รอบการตรวจ': `ครั้งที่ ${a.round}`,
      'วันที่': new Date(a.timestamp).toLocaleDateString(),
      'เวลา': new Date(a.timestamp).toLocaleTimeString(),
      'แผนก': a.department, 'ผู้ตรวจ': a.auditorName,
      'คะแนนรวม': a.totalScore, 'คะแนนเต็ม': a.maxScore,
      'ร้อยละ': a.passPercentage.toFixed(1)+'%',
      'ผลการตรวจ': a.isPass ? 'ผ่าน (PASS)' : 'ไม่ผ่าน (FAIL)',
      'จำนวน CAR': a.cars.length
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Audit Summary");
    const allCars = filteredAudits.flatMap(a => a.cars.map(c => ({
      'CAR ID': c.id.slice(0,8), 'Audit ID': c.auditId.slice(0,8),
      'แผนก': a.department, 'หัวข้อ': c.question, 'สิ่งที่พบ': c.finding,
      'ความรุนแรง': c.severity, 'สถานะ': c.status, 'CAR No.': c.carNumber||'-',
      'วันที่ออก': new Date(c.issuedDate).toLocaleDateString(),
      'กำหนดเสร็จ': new Date(c.dueDate).toLocaleDateString(), 'ผู้รับผิดชอบ': c.assignedTo
    })));
    if (allCars.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allCars), "CAR List");
    XLSX.writeFile(wb, `Internal_Audit_Report_${Date.now()}.xlsx`);
  };

  const generatePDF = (report) => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(22); doc.setTextColor(79,70,229);
    doc.text("Internal Audit System Report", 105, 20, { align:'center' });
    doc.setFontSize(10); doc.setTextColor(100,116,139);
    doc.text("Cosmetic Factory Internal Audit System", 105, 27, { align:'center' });
    doc.setDrawColor(226,232,240); doc.line(20,35,190,35);
    doc.setFontSize(12); doc.setTextColor(30,41,59);
    doc.text(`Auditor: ${report.auditorName}`, 20, 45);
    doc.text(`Department: ${report.department}`, 20, 52);
    doc.text(`Date: ${new Date(report.timestamp).toLocaleString()}`, 20, 59);
    const sc = report.isPass ? [16,185,129] : [244,63,94];
    doc.setTextColor(sc[0],sc[1],sc[2]);
    doc.text(`Status: ${report.isPass?'PASS':'FAIL'} (${report.passPercentage.toFixed(1)}%)`, 20, 66);
    doc.setTextColor(30,41,59);
    const tableData = report.items.map((item,idx) => [
      (idx+1).toString(),
      item.question + (item.standards?.length > 0 ? `\n[${item.standards.join(', ')}]` : '') + (item.carNumber ? `\n(CAR No.: ${item.carNumber})` : ''),
      item.score, item.comment||'-'
    ]);
    doc.autoTable({ startY:75, head:[['#','Question & Standards','Result','Comment']], body:tableData, headStyles:{fillColor:[79,70,229]}, alternateRowStyles:{fillColor:[248,250,252]} });
    let finalY = doc.lastAutoTable.finalY || 150;
    if (report.cars.length > 0) {
      if (finalY > 240) { doc.addPage(); finalY = 20; }
      doc.setFontSize(14); doc.text("Corrective Action Requests (CAR)", 20, finalY+15);
      doc.autoTable({ startY:finalY+20, head:[['Finding','Severity','Assigned To','Due Date']],
        body: report.cars.map(c => [c.question, c.severity, c.assignedTo, new Date(c.dueDate).toLocaleDateString()]),
        headStyles:{fillColor:[244,63,94]} });
      finalY = doc.lastAutoTable.finalY;
    }
    if (finalY > 250) { doc.addPage(); finalY = 20; }
    doc.text("Signature:", 20, finalY+20);
    if (report.signature) doc.addImage(report.signature, 'PNG', 20, finalY+25, 50, 20);
    doc.text(report.auditorName, 20, finalY+50);
    doc.save(`Audit_${report.department}_${Date.now()}.pdf`);
  };

  // ── RENDER ───────────────────────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-slate-50 font-sans text-slate-900">

      {/* HEADER */}
      <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            <div>
              <h1 className="font-bold text-lg leading-tight">Internal Audit System</h1>
              <p className="text-xs text-slate-500">Cosmetic Factory System</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            {isAuthenticated && (
              <div className="flex items-center gap-1.5 bg-slate-100 p-1 rounded-xl">
                {THEMES.map(t => (
                  <button key={t.id} onClick={() => setTheme(t.id)}
                    className={cn("w-6 h-6 rounded-full transition-all border-2", theme === t.id ? "border-white scale-110 shadow-sm" : "border-transparent opacity-40 hover:opacity-100")}
                    style={{ backgroundColor: t.color }} title={t.name} />
                ))}
              </div>
            )}
            {isAuthenticated && view === 'dashboard' && (
              <div className="flex items-center gap-2">
                <button onClick={() => setView('planning')} className="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-all active:scale-95 shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
                  แผนการตรวจ
                </button>
                <button onClick={() => setView('settings')} className="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 p-2 rounded-lg transition-all active:scale-95 shadow-sm" title="ตั้งค่า">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2a10 10 0 0 1 0 20"/></svg>
                </button>
                <button onClick={handleLogout} className="bg-white border border-slate-200 hover:bg-slate-50 text-rose-600 p-2 rounded-lg transition-all active:scale-95 shadow-sm" title="ออกจากระบบ">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
                </button>
                <button onClick={startNewAudit} className="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-all active:scale-95 shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                  ตรวจหน้างานใหม่
                </button>
              </div>
            )}
            {isAuthenticated && view !== 'dashboard' && (
              <button onClick={() => setView('dashboard')} className="text-slate-500 hover:text-slate-700 p-2 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
              </button>
            )}
          </div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 py-6">
        {!isAuthenticated && view !== 'respond' ? (
          /* ── LOGIN ── */
          <div className="flex flex-col items-center justify-center min-h-[60vh] space-y-8">
            <div className="w-20 h-20 bg-brand-600 rounded-[2rem] flex items-center justify-center text-white shadow-2xl">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            <div className="text-center space-y-2">
              <h2 className="text-3xl font-black text-slate-900">เข้าสู่ระบบ</h2>
              <p className="text-slate-500">กรุณาใส่ PIN เพื่อเข้าถึงข้อมูลระบบ</p>
            </div>
            <form onSubmit={handleLogin} className="w-full max-w-xs space-y-6">
              <div className="relative">
                <input type="password" maxLength={10} placeholder="ใส่ PIN ของคุณ..."
                  value={pinInput} onChange={e => setPinInput(e.target.value.replace(/\D/g,''))}
                  className="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-center text-2xl font-black tracking-[1em] outline-none focus:border-brand-500 transition-all shadow-sm"
                  autoFocus />
                {loginError && <p className="absolute -bottom-6 left-0 right-0 text-center text-xs font-bold text-rose-500">{loginError}</p>}
              </div>
              <button type="submit" className="w-full bg-brand-600 hover:bg-brand-700 text-white py-4 rounded-2xl font-bold text-lg shadow-xl transition-all active:scale-[0.98]">
                ยืนยัน PIN
              </button>
              <p className="text-center text-xs text-slate-400">PIN เริ่มต้น: <span className="font-bold text-slate-600">123456</span></p>
            </form>
          </div>
        ) : (
          <>
          {/* ── DASHBOARD ── */}
          {view === 'dashboard' && (() => {
            const stats = {
              total: filteredAudits.length,
              avgScore: filteredAudits.length ? (filteredAudits.reduce((acc,a) => acc+(a.totalScore/a.maxScore),0)/filteredAudits.length*100).toFixed(1) : 0,
              pendingCars: filteredAudits.reduce((acc,a) => acc+a.cars.filter(c => c.status !== CARStatus.CLOSED).length, 0),
              passed: filteredAudits.filter(a => a.isPass).length
            };
            return (
              <div className="space-y-6 animate-in">
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  {[
                    { label:'ตรวจทั้งหมด', value:stats.total, color:'' },
                    { label:'คะแนนเฉลี่ย', value:`${stats.avgScore}%`, color:'' },
                    { label:'CAR ที่ค้างอยู่', value:stats.pendingCars, color:'text-rose-600' },
                    { label:'ผ่านเกณฑ์', value:stats.passed, color:'text-emerald-600' },
                  ].map(s => (
                    <div key={s.label} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                      <p className="text-slate-500 text-sm font-medium">{s.label}</p>
                      <h3 className={cn("text-3xl font-bold mt-1", s.color)}>{s.value}</h3>
                    </div>
                  ))}
                </div>

                <div className="bg-brand-50 border border-brand-100 p-4 rounded-2xl flex items-center justify-between flex-wrap gap-3">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-brand-100 rounded-full flex items-center justify-center text-brand-600">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    </div>
                    <div>
                      <h4 className="font-bold text-brand-900 text-sm">ความถี่การตรวจภายใน (Internal Audit)</h4>
                      <p className="text-xs text-brand-700">กำหนดการตรวจ: 2 ครั้งต่อปี (ทุก 6 เดือน)</p>
                    </div>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    <div className="bg-white border border-brand-200 px-3 py-1.5 rounded-lg flex items-center gap-2">
                      <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">รอบ:</span>
                      <select value={filterRound} onChange={e => setFilterRound(e.target.value === 'all' ? 'all' : Number(e.target.value))}
                        className="text-xs font-bold text-brand-600 outline-none bg-transparent cursor-pointer">
                        <option value="all">ทั้งหมด</option>
                        <option value={1}>ครั้งที่ 1</option>
                        <option value={2}>ครั้งที่ 2</option>
                      </select>
                    </div>
                    <button onClick={generateExcel} className="bg-white text-brand-600 border border-brand-200 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 hover:bg-brand-50 transition-colors">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="3" y2="21"/></svg>
                      Export Excel
                    </button>
                    <button onClick={() => setView('cars')} className="bg-brand-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 hover:bg-brand-700 transition-colors">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                      ดู CAR ทั้งหมด
                    </button>
                  </div>
                </div>

                {/* Dept Stats */}
                <div className="space-y-4">
                  <h2 className="font-bold text-xl flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" className="text-brand-600"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
                    สรุปรายแผนก (Company-wide)
                  </h2>
                  {audits.length > 0 ? (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {getDeptStats().map(stat => (
                        <div key={stat.name} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                          <div>
                            <h4 className="font-bold text-slate-800 text-sm">{stat.name}</h4>
                            <p className="text-xs text-slate-500">ตรวจแล้ว {stat.total} ครั้ง | ผ่าน {stat.passed} ครั้ง</p>
                          </div>
                          <div className="text-right">
                            <p className={cn("text-lg font-black", stat.avgScore >= 70 ? "text-emerald-600" : "text-rose-600")}>{stat.avgScore.toFixed(1)}%</p>
                            <div className="w-24 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden">
                              <div className={cn("h-full transition-all", stat.avgScore>=70?"bg-emerald-500":"bg-rose-500")} style={{ width:`${stat.avgScore}%` }} />
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : <p className="text-slate-400 text-sm italic px-2">ยังไม่มีข้อมูลสรุปรายแผนก</p>}
                </div>

                {/* History */}
                <div className="space-y-4">
                  <h2 className="font-bold text-xl flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" className="text-brand-600"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                    ประวัติการตรวจล่าสุด
                  </h2>
                  {filteredAudits.length === 0 ? (
                    <div className="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-12 text-center">
                      <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                      </div>
                      <h3 className="font-bold text-lg text-slate-700">ไม่พบประวัติการตรวจ</h3>

                          </div>
                        </div>

                              </div>

                            </button>

                                  : "bg-amber-500 border-amber-500 text-white shadow-lg shadow-amber-100 scale-105"
                                  : "bg-white border-slate-100 text-slate-400 hover:border-slate-200")}>
                              {s}
                            </button>
                          ))}
                        </div>

                        <div className="flex flex-wrap items-center gap-3">
                          <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mr-2">CAR No.:</span>

                        </div>

                        <div className="flex flex-wrap items-center gap-6 py-2">
                          <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mr-2">ข้อกำหนด:</span>

                              <button key={standard} onClick={() => {
                                const cur = item.standards||[];

                              }} className={cn("flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-all",
                                item.standards?.includes(standard) ? "bg-brand-50 border-brand-200 text-brand-700 shadow-sm" : "bg-white border-slate-100 text-slate-400 hover:border-slate-200")}>
                                <div className={cn("w-4 h-4 rounded flex items-center justify-center border transition-all",
                                  item.standards?.includes(standard) ? "bg-brand-600 border-brand-600 text-white" : "bg-white border-slate-300")}>

                                <span className="text-xs font-bold">{standard}</span>

                            {item.photo ? (

                                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                                </button>
                              </div>

                              <div className="flex flex-col items-center justify-center aspect-video bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl p-4">

                                  </label>
                                  <label className="flex items-center justify-center gap-2 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-bold text-slate-600 cursor-pointer hover:border-brand-300 hover:text-brand-600 transition-all shadow-sm active:scale-95">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>

                                    <input type="file" accept="image/*" className="hidden" onChange={e=>handlePhotoUpload(item.id,e)} />
                                  </label>
                                </div>
                              </div>
                            )}
                          </div>

                      </div>

                  {currentAudit.signature && (
                    <div className="flex items-center gap-2 text-emerald-600 text-sm font-medium">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>

              </div>
            </div>
          )}

          {view === 'settings' && (
            <div className="space-y-8 pb-20 animate-in">

                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="text-brand-600"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>

                      <button key={t.id} onClick={()=>setTheme(t.id)}

                        <div className="w-6 h-6 rounded-full shadow-inner" style={{ backgroundColor:t.color }} />
                        <span className="font-bold text-sm">{t.name}</span>
                      </button>
                    ))}
                  </div>
                </div>
                <div className="h-px bg-slate-100" />

                      </div>
                      <button onClick={()=>updateSecuritySettings({adminEmail})} className="w-full bg-brand-600 text-white py-3 rounded-xl font-bold hover:bg-brand-700 transition-all active:scale-95">บันทึกอีเมล</button>
                    </div>
                    <div className="space-y-4">
                      <div className="space-y-2">
                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">เปลี่ยน PIN ใหม่ (6-10 หลัก)</label>
                        <input type="password" maxLength={10} placeholder="ใส่ PIN ใหม่..." id="new-pin-input"

                      </div>

                        const newPin = input.value.replace(/\D/g,'');

                      }} className="w-full bg-brand-600 text-white py-3 rounded-xl font-bold hover:bg-brand-700 transition-all active:scale-95">เปลี่ยน PIN</button>
                    </div>
                  </div>
                </div>
              </section>
            </div>
          )}

                    { label:'วันที่ตรวจ', el: <input type="date" value={newPlanDate} onChange={e=>setNewPlanDate(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-brand-500" /> },

                    { label:'รอบการตรวจ', el: <select value={newPlanRound} onChange={e=>setNewPlanRound(Number(e.target.value))} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-brand-500"><option value={1}>ครั้งที่ 1</option><option value={2}>ครั้งที่ 2</option></select> },

                  addPlan({ department:newPlanDept, plannedDate:newPlanDate, auditorId:newPlanAuditorId, round:newPlanRound });
                  setNewPlanDept(''); setNewPlanDate(''); setNewPlanAuditorId('');

                              : si.status==='overdue' ? <span className="bg-rose-100 text-rose-700 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 w-fit"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>เลยกำหนด</span>
                              : <span className="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 w-fit"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/></svg>ตามแผน</span>}
                            </td>
                            <td className="px-4 py-4 text-center">
                              <button onClick={()=>removePlan(plan.id)} className="p-2 text-slate-400 hover:text-rose-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                              </button>
                            </td>
                          </tr>
                        );

                  </table>

              </div>

                              {car.severity}
                            </span>
                            <span className={cn("px-2 py-0.5 rounded text-[10px] font-black uppercase border",

                              {car.status}
                            </span>
                          </div>
                          <h4 className="font-bold text-slate-900">{car.question}</h4>
                          <div className="flex flex-wrap gap-x-4 gap-y-1">
                            <p className="text-xs text-slate-500">แผนก: {audits.find(a=>a.id===car.auditId)?.department}</p>

                          <span className="text-xs text-slate-600">ผู้รับผิดชอบ: {car.assignedTo}</span>
                        </div>
                        <div className="flex gap-2">
                          {car.status!==CARStatus.CLOSED && <button onClick={()=>updateCARStatus(car.auditId,car.id,CARStatus.CLOSED)} className="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-emerald-700 transition-colors">ปิด CAR</button>}
                          {car.status===CARStatus.OPEN && <button onClick={()=>updateCARStatus(car.auditId,car.id,CARStatus.PENDING)} className="bg-amber-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-amber-600 transition-colors">กำลังดำเนินการ</button>}
                        </div>
                      </div>
                    </div>
                  )))
                )}
              </div>
            </div>

                    <div className="text-right">
                      <div className="text-4xl font-black">{Math.round((selectedReport.totalScore/selectedReport.maxScore)*100)}%</div>

                    </div>

                    {[
                      {label:'Auditor',value:selectedReport.auditorName,align:''},
                      {label:'Department',value:selectedReport.department,align:'text-right'},
                      {label:'Date & Time',value:new Date(selectedReport.timestamp).toLocaleString(),align:''},
                      {label:'Audit Round',value:`ครั้งที่ ${selectedReport.round}`,align:'text-right',brand:true},
                      {label:'Audit ID',value:<span className="font-mono text-xs text-slate-500">{selectedReport.id.slice(0,8)}</span>,align:''},

                      <div key={f.label} className={cn("space-y-1", f.align)}>

                              {item.standards?.length>0 && (
                                <div className="flex flex-wrap gap-2 mt-1">
                                  {item.standards.map(s => <span key={s} className="text-[10px] font-bold bg-brand-50 text-brand-600 px-2 py-0.5 rounded border border-brand-100 uppercase">{s}</span>)}
                                </div>
                              )}
                              {item.carNumber && <p className="text-xs font-bold text-rose-600 mt-1">CAR No.: {item.carNumber}</p>}
                            </div>
                            <span className={cn("px-3 py-1 rounded-full text-xs font-bold",
                              item.score==='C'?"bg-emerald-100 text-emerald-700":item.score==='NC'?"bg-rose-100 text-rose-700":"bg-amber-100 text-amber-700")}>
                              {item.score}
                            </span>
                          </div>
                          {item.comment && <div className="bg-slate-50 p-3 rounded-xl text-sm text-slate-600 italic">"{item.comment}"</div>}
                          {item.photo && <div className="max-w-xs rounded-xl overflow-hidden border border-slate-200"><img src={item.photo} alt="evidence" className="w-full h-auto" /></div>}
                        </div>
                      ))}
                    </div>
                  </div>
                  {selectedReport.cars.length>0 && (
                    <div className="border-t border-slate-100 pt-8">
                      <h3 className="font-bold text-lg mb-4 text-rose-600 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                        Corrective Action Requests ({selectedReport.cars.length})
                      </h3>
                      <div className="space-y-4">
                        {selectedReport.cars.map(car => (
                          <div key={car.id} className="border border-rose-100 rounded-2xl p-4 bg-rose-50/30 space-y-2">
                            <div className="flex items-center justify-between">
                              <div className="flex items-center gap-2">
                                <span className={cn("px-2 py-0.5 rounded text-[10px] font-black uppercase",car.severity===CARSeverity.MAJOR?"bg-rose-100 text-rose-700":"bg-amber-100 text-amber-700")}>{car.severity}</span>
                                <span className={cn("px-2 py-0.5 rounded text-[10px] font-black uppercase border",car.status===CARStatus.OPEN?"border-rose-200 text-rose-600 bg-rose-50":car.status===CARStatus.PENDING?"border-amber-200 text-amber-600 bg-amber-50":"border-emerald-200 text-emerald-600 bg-emerald-50")}>{car.status}</span>
                              </div>
                              <p className="text-xs text-slate-500">กำหนด: {new Date(car.dueDate).toLocaleDateString()}</p>
                            </div>
                            <p className="font-bold text-slate-800 text-sm">{car.question}</p>
                            {car.carNumber && <p className="text-xs font-bold text-rose-600">CAR No.: {car.carNumber}</p>}
                            <p className="text-xs text-slate-500">ผู้รับผิดชอบ: {car.assignedTo}</p>
                            {car.rootCause && (
                              <div className="mt-2 p-3 bg-white rounded-xl border border-slate-200 space-y-1">
                                <p className="text-[10px] font-bold text-slate-400 uppercase">การตอบกลับ</p>
                                <p className="text-xs text-slate-600"><span className="font-bold">Root Cause:</span> {car.rootCause}</p>
                                <p className="text-xs text-slate-600"><span className="font-bold">Correction:</span> {car.correction}</p>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  <div className="border-t border-slate-100 pt-8 flex justify-between items-end">
                    <div className="space-y-2">
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Digital Signature</p>
                      {selectedReport.signature && <img src={selectedReport.signature} alt="signature" className="h-16 w-auto border-b border-slate-300" />}
                      <p className="text-sm font-medium text-slate-700">{selectedReport.auditorName}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-xs text-slate-400 italic">Generated by Cosmetic Internal Audit System</p>
                    </div>
                  </div>
                </div>
              </div>
              <div className="flex gap-4">
                <button onClick={()=>generatePDF(selectedReport)} className="flex-1 bg-brand-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                  ดาวน์โหลด PDF
                </button>
                <button onClick={()=>setView('dashboard')} className="flex-1 bg-white border border-slate-200 text-slate-600 py-4 rounded-2xl font-bold shadow-sm">กลับหน้าหลัก</button>
              </div>
            </div>
          )}

          {/* ── RESPOND (QR mode) ── */}
          {view === 'respond' && responseDept && (
            <div className="max-w-4xl mx-auto space-y-6 animate-in">
              <div className="bg-brand-600 p-8 rounded-3xl text-white shadow-xl">
                <h2 className="font-bold text-3xl mb-2 flex items-center gap-3">
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                  ระบบตอบกลับ CAR ออนไลน์
                </h2>
                <p className="opacity-80">แผนก: <span className="font-bold">{responseDept}</span></p>
              </div>
              <div className="space-y-4">
                {audits.flatMap(a=>a.cars).filter(c=>audits.find(a=>a.id===c.auditId)?.department===responseDept&&c.status!==CARStatus.CLOSED).length===0 ? (
                  <div className="bg-white border border-slate-200 rounded-3xl p-12 text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="text-emerald-500 mx-auto mb-4"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <h3 className="font-bold text-lg">ไม่มีรายการ CAR ค้างคา</h3>
                    <p className="text-slate-500">ขอบคุณที่ให้ความร่วมมือในการแก้ไข</p>
                  </div>
                ) : (
                  audits.flatMap(audit => audit.cars.map(car => {
                    if(audits.find(a=>a.id===car.auditId)?.department!==responseDept||car.status===CARStatus.CLOSED) return null;
                    return (
                      <div key={car.id} className="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm">
                        <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                          <div className="flex justify-between items-start mb-4">
                            <div className="space-y-1">
                              <span className={cn("px-2 py-0.5 rounded text-[10px] font-black uppercase",car.severity===CARSeverity.MAJOR?"bg-rose-100 text-rose-700":"bg-amber-100 text-amber-700")}>{car.severity}</span>
                              <h4 className="font-bold text-xl text-slate-900">{car.question}</h4>
                              {car.carNumber && <p className="text-sm font-bold text-rose-600">CAR No.: {car.carNumber}</p>}
                            </div>
                            <div className="text-right">
                              <p className="text-[10px] font-bold text-slate-400 uppercase">กำหนดเสร็จ</p>
                              <p className="text-sm font-bold text-rose-600">{new Date(car.dueDate).toLocaleDateString()}</p>
                            </div>
                          </div>
                          <div className="bg-white p-4 rounded-2xl border border-slate-200">
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">สิ่งที่พบ (Finding)</p>
                            <p className="text-slate-700">{car.finding}</p>
                          </div>
                        </div>
                        <div className="p-6 space-y-6">
                          {respondingCar?.id===car.id ? (
                            <div className="space-y-6 animate-in">
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {[
                                  {key:'rootCause',label:'สาเหตุที่แท้จริง (Root Cause)',ph:'ระบุสาเหตุที่ทำให้เกิดปัญหานี้...'},
                                  {key:'correction',label:'การแก้ไขเบื้องต้น (Correction)',ph:'ระบุการแก้ไขที่ทำไปแล้วทันที...'},
                                ].map(f=>(
                                  <div key={f.key} className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 uppercase">{f.label}</label>
                                    <textarea className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 min-h-[100px] outline-none focus:ring-2 focus:ring-brand-500" placeholder={f.ph}
                                      value={carResponseData[f.key]} onChange={e=>setCarResponseData({...carResponseData,[f.key]:e.target.value})} />
                                  </div>
                                ))}
                              </div>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {[
                                  {key:'preventiveAction',label:'การป้องกัน (Preventive Action)',ph:'ระบุแนวทางป้องกันไม่ให้เกิดซ้ำ...'},
                                  {key:'correctiveAction',label:'Corrective Action',ph:'ระบุแนวทางแก้ไขระยะยาว...'},
                                ].map(f=>(
                                  <div key={f.key} className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 uppercase">{f.label}</label>
                                    <textarea className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 min-h-[100px] outline-none focus:ring-2 focus:ring-brand-500" placeholder={f.ph}
                                      value={carResponseData[f.key]} onChange={e=>setCarResponseData({...carResponseData,[f.key]:e.target.value})} />
                                  </div>
                                ))}
                              </div>
                              <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-500 uppercase">รูปภาพหลักฐานการแก้ไข</label>
                                <div className="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl p-4 bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer relative min-h-[100px]">
                                  {carResponseData.photo ? (
                                    <div className="relative w-full">
                                      <img src={carResponseData.photo} alt="evidence" className="w-full h-auto rounded-xl" />
                                      <button onClick={()=>setCarResponseData({...carResponseData,photo:''})} className="absolute top-2 right-2 bg-rose-600 text-white p-1 rounded-full shadow-lg">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
                                      </button>
                                    </div>
                                  ) : (
                                    <>
                                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="text-slate-400 mb-2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                      <p className="text-xs text-slate-500">คลิกเพื่อถ่ายรูปหรืออัปโหลด</p>
                                      <input type="file" accept="image/*" capture="environment" className="absolute inset-0 opacity-0 cursor-pointer"
                                        onChange={e=>{const f=e.target.files?.[0];if(f){const r=new FileReader();r.onloadend=()=>setCarResponseData({...carResponseData,photo:r.result});r.readAsDataURL(f);}}} />
                                    </>
                                  )}
                                </div>
                              </div>
                              <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-500 uppercase">ลายเซ็นผู้รับผิดชอบ</label>
                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                  <SignatureInput onSave={sig=>setCarResponseData({...carResponseData,signature:sig})} onClear={()=>setCarResponseData({...carResponseData,signature:''})} />
                                </div>
                              </div>
                              <div className="flex gap-3 pt-4">
                                <button onClick={submitCARResponse} className="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-700 transition-all shadow-lg active:scale-[0.98]">
                                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                  ส่งข้อมูลการแก้ไข
                                </button>
                                <button onClick={()=>setRespondingCar(null)} className="px-8 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">ยกเลิก</button>
                              </div>
                            </div>
                          ) : (
                            <button onClick={()=>setRespondingCar(car)} className="w-full bg-brand-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-brand-700 transition-all shadow-lg active:scale-[0.98]">
                              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                              ตอบกลับ CAR นี้
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  }))
                )}
              </div>
            </div>
          )}
          </>
        )}
      </main>

      {/* ── QR MODAL ── */}
      {showQrModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={()=>setShowQrModal(null)} />
          <div className="relative bg-white w-full max-w-2xl rounded-[40px] shadow-2xl overflow-hidden">
            <div className="p-8 space-y-6">
              <div className="flex justify-between items-center">
                <h3 className="text-2xl font-bold text-slate-900">QR Code สำหรับแผนก</h3>
                <button onClick={()=>setShowQrModal(null)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="text-slate-400"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
                </button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto pr-2">
                {DEPARTMENTS.map(dept => {
                  const url = `${window.location.origin}${window.location.pathname}?dept=${encodeURIComponent(dept)}`;
                  return (
                    <div key={dept} className="bg-slate-50 p-4 rounded-3xl border border-slate-100 flex flex-col items-center space-y-3">
                      <p className="font-bold text-slate-800">{dept}</p>
                      <div className="bg-white p-3 rounded-2xl shadow-sm qr-container">
                        <QRCode value={url} size={120} />
                      </div>
                      <button onClick={()=>{ navigator.clipboard.writeText(url); alert('คัดลอกลิงก์เรียบร้อยแล้ว'); }}
                        className="text-[10px] font-bold text-brand-600 uppercase tracking-wider hover:underline">
                        คัดลอกลิงก์
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── DELETE MODAL ── */}
      {deleteConfirmId && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={()=>setDeleteConfirmId(null)} />
          <div className="relative bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <div className="w-20 h-20 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-6">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </div>
            <h3 className="text-2xl font-black text-slate-900 mb-2">ยืนยันการลบ?</h3>
            <p className="text-slate-500 mb-8 leading-relaxed">คุณต้องการลบรายงานการตรวจนี้ใช่หรือไม่? <br/><span className="text-rose-500 font-bold">การกระทำนี้ไม่สามารถย้อนกลับได้</span></p>
            <div className="grid grid-cols-2 gap-4">
              <button onClick={()=>setDeleteConfirmId(null)} className="py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-colors">ยกเลิก</button>
              <button onClick={()=>deleteAudit(deleteConfirmId)} className="py-4 bg-rose-600 text-white rounded-2xl font-bold hover:bg-rose-700 transition-colors shadow-lg shadow-rose-200">ยืนยันการลบ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
